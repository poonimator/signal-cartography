<!DOCTYPE html>
<html lang="en" data-theme="night">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Studio · Aura</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
            --font-sans: 'DM Sans', system-ui, sans-serif;
            --font-mono: 'DM Mono', monospace;
            --font-serif: 'Instrument Serif', serif;
        }
        html[data-theme="day"] {
            --bg: #f5f5f0;
            --bg-card: #eaeae5;
            --text: #1a1a1a;
            --text-body: rgba(26,26,26,0.65);
            --text-muted: rgba(26,26,26,0.4);
            --text-dim: rgba(26,26,26,0.25);
            --border: rgba(0,0,0,0.08);
            --border-strong: rgba(0,0,0,0.14);
            --accent: #E8421A;
            --canvas-bg: #eaeae5;
        }
        html[data-theme="night"] {
            --bg: #131719;
            --bg-card: #1a1d20;
            --text: #ededed;
            --text-body: rgba(237,237,237,0.65);
            --text-muted: rgba(237,237,237,0.4);
            --text-dim: rgba(237,237,237,0.25);
            --border: rgba(255,255,255,0.08);
            --border-strong: rgba(255,255,255,0.14);
            --accent: #E8421A;
            --canvas-bg: #0a0c0e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: var(--bg); color: var(--text);
            font-family: var(--font-sans); font-size: 14px;
            min-height: 100vh; overflow: hidden;
            transition: background 0.4s var(--ease), color 0.4s var(--ease);
            -webkit-font-smoothing: antialiased;
        }
        .app { display: flex; height: 100vh; }
        .sidebar {
            width: 300px; flex-shrink: 0;
            background: var(--bg); border-right: 1px solid var(--border);
            padding: 20px; overflow-y: auto;
            display: flex; flex-direction: column;
            scrollbar-width: thin;
        }
        .topbar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }
        .back {
            display: inline-flex; align-items: center; gap: 6px;
            font-family: var(--font-mono); font-size: 11px;
            color: var(--text-muted); text-decoration: none;
            letter-spacing: 1px; text-transform: uppercase;
        }
        .back:hover { color: var(--text); }
        .theme-toggle {
            background: transparent; border: 1px solid var(--border-strong);
            border-radius: 3px; padding: 4px 10px; cursor: pointer;
            font-family: var(--font-mono); font-size: 11px;
            color: var(--text-body); letter-spacing: 1px;
            text-transform: uppercase; transition: all 0.2s var(--ease);
        }
        .theme-toggle:hover { color: var(--text); border-color: var(--text); }

        .sidebar h1 {
            font-family: var(--font-serif); font-weight: 400;
            font-size: 28px; line-height: 1.1; letter-spacing: -0.5px;
            color: var(--text); margin-bottom: 4px;
        }
        .subtitle {
            font-family: var(--font-sans); font-size: 12px;
            color: var(--text-body); line-height: 1.5;
            margin-bottom: 24px;
        }

        .label {
            font-family: var(--font-mono); font-size: 10px; font-weight: 400;
            letter-spacing: 1px; text-transform: uppercase;
            color: var(--text-muted);
        }
        .section { margin-bottom: 20px; }
        .section-title {
            font-family: var(--font-mono); font-size: 10px;
            letter-spacing: 1px; text-transform: uppercase;
            color: var(--text-muted); margin-bottom: 10px;
        }

        .control { margin-bottom: 10px; }
        .control label {
            display: flex; justify-content: space-between; align-items: center;
            font-family: var(--font-mono); font-size: 11px;
            color: var(--text-body); margin-bottom: 4px;
            letter-spacing: 0.5px;
        }
        .val { color: var(--text); font-weight: 500; }

        input[type="range"] {
            width: 100%; height: 2px; background: var(--border-strong);
            border-radius: 1px; outline: none; -webkit-appearance: none;
            appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 10px; height: 10px;
            background: var(--text); border-radius: 50%; cursor: pointer;
            transition: transform 0.15s;
        }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.3); }
        input[type="range"]::-moz-range-thumb {
            width: 10px; height: 10px; background: var(--text);
            border-radius: 50%; border: none; cursor: pointer;
        }

        .btn {
            background: transparent; color: var(--text-body);
            border: 1px solid var(--border-strong); padding: 5px 10px;
            border-radius: 3px; font-family: var(--font-mono);
            font-size: 11px; letter-spacing: 0.5px;
            cursor: pointer; transition: all 0.15s var(--ease);
        }
        .btn:hover { color: var(--text); border-color: var(--text); }
        .btn.active {
            color: var(--text); border-color: var(--text);
            background: rgba(128,128,128,0.08);
        }
        .btn.primary {
            background: var(--text); color: var(--bg);
            border-color: var(--text);
        }
        .btn.primary:hover {
            background: var(--text); color: var(--bg);
            opacity: 0.85;
        }
        .btn-row { display: flex; gap: 6px; flex-wrap: wrap; }
        .btn-row .btn { flex: 1; min-width: 0; text-align: center; }

        .seed-row { display: flex; gap: 6px; align-items: center; margin-bottom: 8px; }
        .seed-input {
            flex: 1; background: transparent; color: var(--text);
            border: 1px solid var(--border-strong); padding: 5px 10px;
            border-radius: 3px; font-family: var(--font-mono);
            font-size: 12px; text-align: center; outline: none;
            transition: border-color 0.15s;
        }
        .seed-input:focus { border-color: var(--text); }

        input[type="color"] {
            width: 24px; height: 24px; border: none;
            border-radius: 3px; cursor: pointer; background: none; padding: 0;
        }
        .color-row { display: flex; align-items: center; gap: 8px; }
        .color-hex {
            font-family: var(--font-mono); font-size: 11px;
            color: var(--text-body); letter-spacing: 0.5px;
        }

        /* Palette selector — swatches only */
        .palette-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 5px;
        }
        .palette-btn {
            padding: 6px 8px; cursor: pointer;
            border: 1px solid var(--border-strong); border-radius: 3px;
            background: transparent; transition: all 0.15s var(--ease);
            display: flex; flex-direction: column; gap: 4px;
        }
        .palette-btn:hover { border-color: var(--text); }
        .palette-btn.active { border-color: var(--text); background: rgba(128,128,128,0.08); }
        .palette-btn .swatches { display: flex; gap: 2px; }
        .palette-btn .swatch { width: 10px; height: 10px; border-radius: 2px; flex: 1; }
        .palette-btn .pal-name {
            font-family: var(--font-mono); font-size: 10px;
            color: var(--text-body); letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .palette-btn.active .pal-name { color: var(--text); }

        /* Shape selector — visual icons */
        .shapes-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px;
        }
        .shape-btn {
            aspect-ratio: 1; padding: 6px;
            border: 1px solid var(--border-strong); border-radius: 3px;
            background: transparent; cursor: pointer;
            transition: all 0.15s var(--ease);
            display: flex; align-items: center; justify-content: center;
        }
        .shape-btn:hover { border-color: var(--text); }
        .shape-btn.active { border-color: var(--text); background: rgba(128,128,128,0.08); }
        .shape-btn svg { width: 60%; height: 60%; }
        .shape-btn svg * { fill: var(--text-muted); stroke: var(--text-muted); transition: all 0.15s; }
        .shape-btn.active svg * { fill: var(--text); stroke: var(--text); }

        /* Preset buttons */
        .preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .preset-btn {
            padding: 7px 8px; text-align: left; cursor: pointer;
            border: 1px solid var(--border-strong); border-radius: 3px;
            background: transparent; transition: all 0.15s var(--ease);
        }
        .preset-btn:hover { border-color: var(--text); }
        .preset-btn.active { border-color: var(--text); background: rgba(128,128,128,0.08); }
        .preset-btn .title {
            font-family: var(--font-mono); font-size: 11px;
            color: var(--text); letter-spacing: 0.5px;
            text-transform: uppercase; display: block; margin-bottom: 2px;
        }
        .preset-btn .desc {
            font-family: var(--font-mono); font-size: 9px;
            color: var(--text-muted); letter-spacing: 0.3px;
            display: block;
        }

        .toggle-row {
            display: flex; gap: 8px; align-items: center;
            font-family: var(--font-mono); font-size: 11px;
            color: var(--text-body); letter-spacing: 0.5px;
            cursor: pointer;
        }
        .toggle-row input[type="checkbox"] {
            cursor: pointer; accent-color: var(--text);
            width: 12px; height: 12px;
        }

        /* Canvas area */
        .canvas-area {
            flex: 1; display: flex; align-items: center; justify-content: center;
            background: var(--bg-card); position: relative;
            transition: background 0.4s var(--ease);
        }
        #output {
            max-width: 100%; max-height: 94vh;
            cursor: crosshair;
        }
        .status {
            position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
            font-family: var(--font-mono); font-size: 10px;
            letter-spacing: 1px; color: var(--text-muted);
            background: var(--bg); backdrop-filter: blur(10px);
            padding: 5px 12px; border-radius: 3px; border: 1px solid var(--border);
            text-transform: uppercase;
        }

        /* Scrollbar */
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

        @media (max-width: 900px) {
            .app { flex-direction: column; }
            .sidebar { width: 100%; max-height: 50vh; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="topbar">
            <a href="/" class="back">← Aura</a>
            <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">Day</button>
        </div>

        <h1>Pattern Studio</h1>
        <div class="subtitle">Noise-driven aura grid. Reproducible through seeds. Living when animated, stilled for export.</div>

        <div class="section">
            <div class="section-title">Preset</div>
            <div class="preset-grid" id="preset-grid"></div>
        </div>

        <div class="section">
            <div class="section-title">Seed</div>
            <div class="seed-row">
                <input type="number" class="seed-input" id="seed" value="42">
                <button class="btn" onclick="prevSeed()">←</button>
                <button class="btn" onclick="nextSeed()">→</button>
            </div>
            <button class="btn" style="width:100%" onclick="randomSeed()">↻ Random</button>
        </div>

        <div class="section">
            <div class="section-title">Shapes</div>
            <div class="shapes-grid" id="shapes-grid"></div>
        </div>

        <div class="section">
            <div class="section-title">Palette</div>
            <div class="palette-grid" id="palette-list"></div>
        </div>

        <div class="section">
            <div class="section-title">Field</div>
            <div class="control"><label>Cell Size <span class="val" id="cellSize-val">14</span></label>
                <input type="range" id="cellSize" min="4" max="40" step="1" value="14"></div>
            <div class="control"><label>Sparsity <span class="val" id="sparsity-val">0.40</span></label>
                <input type="range" id="sparsity" min="0.0" max="0.7" step="0.02" value="0.40"></div>
            <div class="control"><label>Noise Scale <span class="val" id="noiseScale-val">0.04</span></label>
                <input type="range" id="noiseScale" min="0.01" max="0.15" step="0.005" value="0.04"></div>
            <div class="control"><label>Flow Speed <span class="val" id="flowSpeed-val">0.15</span></label>
                <input type="range" id="flowSpeed" min="0.0" max="0.5" step="0.01" value="0.15"></div>
        </div>

        <div class="section">
            <div class="section-title">Render</div>
            <div class="control"><label>Shape Scale <span class="val" id="shapeScale-val">0.9</span></label>
                <input type="range" id="shapeScale" min="0.3" max="1.3" step="0.05" value="0.9"></div>
            <div class="control"><label>Pulse <span class="val" id="pulse-val">0.15</span></label>
                <input type="range" id="pulse" min="0.0" max="0.5" step="0.02" value="0.15"></div>
            <div class="control"><label>Background</label>
                <div class="color-row"><input type="color" id="bgColor" value="#0a0c0e">
                    <span class="color-hex" id="bgColor-hex">#0a0c0e</span></div></div>
            <div class="toggle-row" style="margin-top:10px">
                <input type="checkbox" id="mouseReactive" checked>
                <label for="mouseReactive">Mouse reactive</label>
            </div>
            <div class="toggle-row" style="margin-top:6px">
                <input type="checkbox" id="animated" checked>
                <label for="animated">Animated</label>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Export</div>
            <div class="control">
                <label>Resolution <span class="val" id="exportRes-val">2x</span></label>
                <input type="range" id="exportRes" min="1" max="4" step="1" value="2">
            </div>
            <div class="btn-row" style="margin-top:8px">
                <button class="btn primary" onclick="exportFrame()">Screenshot</button>
                <button class="btn" id="recordBtn" onclick="toggleRecord()">Record 5s</button>
            </div>
        </div>

        <div style="flex:1; min-height:16px"></div>
        <button class="btn" style="width:100%" onclick="resetAll()">Reset</button>
    </div>

    <div class="canvas-area">
        <canvas id="output"></canvas>
        <div class="status" id="status">Ready</div>
    </div>
</div>

<script>
// ═══ PALETTES ═══
const PALETTES = [
    { id: 'brand', label: 'Brand', colors: ['#E8421A','#F07820','#F5B810','#F2A08A','#8AAEE0','#D4C020','#7A9040','#FFFFFF'] },
    { id: 'warm', label: 'Warm', colors: ['#E8421A','#F07820','#F5B810','#E37128'] },
    { id: 'cool', label: 'Cool', colors: ['#8AAEE0','#A5B6C8','#7A9040','#D4C020'] },
    { id: 'earth', label: 'Earth', colors: ['#8B6E4E','#A67C52','#C4A265','#D4C020','#7A9040','#4A5E3A'] },
    { id: 'dusk', label: 'Dusk', colors: ['#2D1B4E','#5C3D7A','#A878C8','#E0B8D0','#F5D0C0','#FFE8D6'] },
    { id: 'flora', label: 'Flora', colors: ['#D4C020','#7A9040','#4A7A3A','#A0D060','#F5B810','#FFFFFF'] },
    { id: 'ocean', label: 'Ocean', colors: ['#0A2E4A','#1A5276','#2E86C1','#85C1E9','#D6EAF8','#FFFFFF'] },
    { id: 'ember', label: 'Ember', colors: ['#3A0A0A','#8B1A1A','#E8421A','#F07820','#F5B810','#FFE0A0'] },
    { id: 'mineral', label: 'Mineral', colors: ['#2C2C3A','#4A4A6A','#8A8AB0','#C0C0D8','#E8E8F0','#FFFFFF'] },
    { id: 'mono-light', label: 'Mono', colors: ['#FFFFFF'] },
    { id: 'mono-gold', label: 'Gold', colors: ['#F5B810'] },
    { id: 'mono-dark', label: 'Dark', colors: ['#1a1a1a'] },
];

// ═══ SHAPES (with SVG icons) ═══
const SHAPES = [
    { id: 'circle', svg: '<circle cx="12" cy="12" r="9" />' },
    { id: 'ring', svg: '<circle cx="12" cy="12" r="8" fill="none" stroke-width="3" />' },
    { id: 'cross', svg: '<rect x="10" y="3" width="4" height="18" /><rect x="3" y="10" width="18" height="4" />' },
    { id: 'rect', svg: '<rect x="4" y="4" width="16" height="16" />' },
    { id: 'dot', svg: '<circle cx="12" cy="12" r="3.5" />' },
    { id: 'dash', svg: '<rect x="3" y="10" width="18" height="4" />' },
    { id: 'diamond', svg: '<polygon points="12,3 21,12 12,21 3,12" />' },
];
const SHAPE_IDS = SHAPES.map(s => s.id);

// ═══ PRESETS ═══
const PRESETS = [
    { id: 'aura-brand', title: 'Aura', desc: 'Brand grid',
      config: { palette: 'brand', activeShapes: SHAPE_IDS.slice(),
                cellSize: 14, sparsity: 0.40, noiseScale: 0.04, flowSpeed: 0.15,
                shapeScale: 0.9, pulse: 0.15, bgColor: null, seed: 42 } },
    { id: 'mudigere', title: 'Mudigere', desc: 'Earth tones',
      config: { palette: 'earth', activeShapes: ['circle','dot','ring','diamond'],
                cellSize: 12, sparsity: 0.30, noiseScale: 0.05, flowSpeed: 0.12,
                shapeScale: 0.85, pulse: 0.12, bgColor: null, seed: 7 } },
    { id: 'ember', title: 'Ember', desc: 'Fire',
      config: { palette: 'ember', activeShapes: ['circle','cross','dot','diamond'],
                cellSize: 16, sparsity: 0.38, noiseScale: 0.035, flowSpeed: 0.18,
                shapeScale: 0.95, pulse: 0.25, bgColor: null, seed: 99 } },
    { id: 'ocean', title: 'Ocean', desc: 'Cool',
      config: { palette: 'ocean', activeShapes: ['dot','ring','circle'],
                cellSize: 12, sparsity: 0.42, noiseScale: 0.04, flowSpeed: 0.1,
                shapeScale: 0.9, pulse: 0.1, bgColor: null, seed: 23 } },
    { id: 'dusk', title: 'Dusk', desc: 'Soft',
      config: { palette: 'dusk', activeShapes: ['circle','ring','dot'],
                cellSize: 14, sparsity: 0.38, noiseScale: 0.03, flowSpeed: 0.08,
                shapeScale: 1.0, pulse: 0.2, bgColor: null, seed: 55 } },
    { id: 'flora', title: 'Flora', desc: 'Growth',
      config: { palette: 'flora', activeShapes: ['diamond','dot','ring','cross'],
                cellSize: 12, sparsity: 0.36, noiseScale: 0.06, flowSpeed: 0.13,
                shapeScale: 0.8, pulse: 0.15, bgColor: null, seed: 13 } },
    { id: 'mineral', title: 'Mineral', desc: 'Cold',
      config: { palette: 'mineral', activeShapes: ['rect','cross','dash'],
                cellSize: 16, sparsity: 0.42, noiseScale: 0.035, flowSpeed: 0.06,
                shapeScale: 0.85, pulse: 0.05, bgColor: null, seed: 11 } },
    { id: 'constellation', title: 'Stars', desc: 'Sparse',
      config: { palette: 'mono-light', activeShapes: ['dot','ring','cross'],
                cellSize: 20, sparsity: 0.58, noiseScale: 0.03, flowSpeed: 0.05,
                shapeScale: 0.7, pulse: 0.3, bgColor: '#05060a', seed: 777 } },
];

let state = {
    palette: 'brand',
    activeShapes: SHAPE_IDS.slice(),
    cellSize: 14, sparsity: 0.40, noiseScale: 0.04, flowSpeed: 0.15,
    shapeScale: 0.9, pulse: 0.15, bgColor: null,
    seed: 42, mouseReactive: true, animated: true,
    theme: localStorage.getItem('aura-theme') || 'night',
};

const canvas = document.getElementById('output');
const ctx = canvas.getContext('2d', { alpha: false });
let W = 0, H = 0;
let cells = [];
let gridCols = 0, gridRows = 0;
let timeT = 0;
let mousePos = { x: -1, y: -1 };
let animFrame;
let lastFrameTime = 0;
const TARGET_FPS = 30;
const FRAME_INTERVAL = 1000 / TARGET_FPS;

// Seeded RNG
function mulberry32(a) {
    return function() {
        a |= 0; a = a + 0x6D2B79F5 | 0;
        let t = Math.imul(a ^ a >>> 15, 1 | a);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
}

// ═══ FAST NOISE (2-octave, seeded) — much cheaper than 5-octave fbm ═══
let seedOffset = 0;
function hashN(x, y) {
    let h = (x + seedOffset) * 374761393 + (y + seedOffset * 7) * 668265263;
    h = (h ^ (h >> 13)) * 1274126177;
    return ((h ^ (h >> 16)) & 0x7fffffff) / 0x7fffffff;
}
function smoothN(t) { return t * t * (3 - 2 * t); }
function noise2D(x, y) {
    const ix = Math.floor(x), iy = Math.floor(y);
    const fx = smoothN(x - ix), fy = smoothN(y - iy);
    const a = hashN(ix, iy), b = hashN(ix+1, iy);
    const c = hashN(ix, iy+1), d = hashN(ix+1, iy+1);
    return a + (b-a)*fx + (c-a)*fy + (a-b-c+d)*fx*fy;
}
// 2-octave fbm — fast enough for live animation
function fbm2(x, y) {
    return 0.5 * noise2D(x, y) + 0.25 * noise2D(x*2, y*2);
}

function getPaletteColors() {
    return (PALETTES.find(p => p.id === state.palette) || PALETTES[0]).colors;
}

function getBg() {
    if (state.bgColor) return state.bgColor;
    return getComputedStyle(document.documentElement).getPropertyValue('--canvas-bg').trim() || '#0a0c0e';
}

// ═══ THEME ═══
function applyTheme(t) {
    state.theme = t;
    document.documentElement.setAttribute('data-theme', t);
    document.getElementById('theme-btn').textContent = t === 'night' ? 'Day' : 'Night';
    localStorage.setItem('aura-theme', t);
    dirty = true;
}
function toggleTheme() { applyTheme(state.theme === 'night' ? 'day' : 'night'); }

// ═══ UI BUILDERS ═══
function buildPresets() {
    const grid = document.getElementById('preset-grid');
    grid.innerHTML = '';
    PRESETS.forEach(p => {
        const btn = document.createElement('button');
        btn.className = 'preset-btn'; btn.dataset.id = p.id;
        btn.innerHTML = `<span class="title">${p.title}</span><span class="desc">${p.desc}</span>`;
        btn.onclick = () => applyPreset(p);
        grid.appendChild(btn);
    });
}
function buildShapes() {
    const grid = document.getElementById('shapes-grid');
    grid.innerHTML = '';
    SHAPES.forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'shape-btn'; btn.dataset.id = s.id; btn.title = s.id;
        btn.innerHTML = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">${s.svg}</svg>`;
        btn.onclick = () => toggleShape(s.id);
        grid.appendChild(btn);
    });
    refreshShapesUI();
}
function buildPalettes() {
    const list = document.getElementById('palette-list');
    list.innerHTML = '';
    PALETTES.forEach(p => {
        const btn = document.createElement('div');
        btn.className = 'palette-btn'; btn.dataset.id = p.id;
        let sw = '<div class="swatches">';
        p.colors.slice(0,6).forEach(c => { sw += `<div class="swatch" style="background:${c}"></div>`; });
        sw += '</div>';
        btn.innerHTML = sw + `<span class="pal-name">${p.label}</span>`;
        btn.onclick = () => setPalette(p.id);
        list.appendChild(btn);
    });
    refreshPalettesUI();
}
function refreshShapesUI() {
    document.querySelectorAll('#shapes-grid .shape-btn').forEach(b =>
        b.classList.toggle('active', state.activeShapes.includes(b.dataset.id)));
}
function refreshPalettesUI() {
    document.querySelectorAll('#palette-list .palette-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.id === state.palette));
}
function refreshPresetUI(id) {
    document.querySelectorAll('#preset-grid .preset-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.id === id));
}
function refreshAllControls() {
    ['cellSize','sparsity','noiseScale','flowSpeed','shapeScale','pulse'].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.value = state[id];
        document.getElementById(id + '-val').textContent = state[id];
    });
    const bg = state.bgColor || getBg();
    document.getElementById('bgColor').value = bg.length === 7 ? bg : '#0a0c0e';
    document.getElementById('bgColor-hex').textContent = state.bgColor || 'theme';
    document.getElementById('seed').value = state.seed;
    document.getElementById('mouseReactive').checked = state.mouseReactive;
    document.getElementById('animated').checked = state.animated;
    refreshShapesUI(); refreshPalettesUI();
}

function setPalette(id) { state.palette = id; refreshPalettesUI(); refreshPresetUI(null); regenerate(); }
function toggleShape(s) {
    const i = state.activeShapes.indexOf(s);
    if (i >= 0) { if (state.activeShapes.length > 1) state.activeShapes.splice(i,1); }
    else state.activeShapes.push(s);
    refreshShapesUI(); refreshPresetUI(null); regenerate();
}
function applyPreset(p) {
    Object.assign(state, p.config);
    if (p.config.activeShapes) state.activeShapes = [...p.config.activeShapes];
    refreshAllControls();
    refreshPresetUI(p.id);
    regenerate();
}
function resetAll() { applyPreset(PRESETS[0]); }
function prevSeed() { state.seed = Math.max(1, state.seed - 1); document.getElementById('seed').value = state.seed; refreshPresetUI(null); regenerate(); }
function nextSeed() { state.seed = state.seed + 1; document.getElementById('seed').value = state.seed; refreshPresetUI(null); regenerate(); }
function randomSeed() { state.seed = Math.floor(Math.random()*999999)+1; document.getElementById('seed').value = state.seed; refreshPresetUI(null); regenerate(); }

let dirty = true;

function wireControls() {
    ['cellSize','sparsity','noiseScale','flowSpeed','shapeScale','pulse'].forEach(id => {
        document.getElementById(id).addEventListener('input', e => {
            state[id] = parseFloat(e.target.value);
            document.getElementById(id + '-val').textContent = e.target.value;
            refreshPresetUI(null);
            if (id === 'cellSize') regenerate();
            else dirty = true;
        });
    });
    document.getElementById('exportRes').addEventListener('input', e => {
        document.getElementById('exportRes-val').textContent = e.target.value + 'x';
    });
    document.getElementById('bgColor').addEventListener('input', e => {
        state.bgColor = e.target.value;
        document.getElementById('bgColor-hex').textContent = e.target.value;
        refreshPresetUI(null); dirty = true;
    });
    document.getElementById('seed').addEventListener('change', e => {
        state.seed = parseInt(e.target.value) || 1;
        refreshPresetUI(null); regenerate();
    });
    document.getElementById('mouseReactive').addEventListener('change', e => { state.mouseReactive = e.target.checked; });
    document.getElementById('animated').addEventListener('change', e => {
        state.animated = e.target.checked;
        if (state.animated) startLoop();
        else { cancelAnimationFrame(animFrame); drawFrame(); }
    });
    canvas.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        mousePos.x = (e.clientX - rect.left) / rect.width;
        mousePos.y = (e.clientY - rect.top) / rect.height;
    });
    canvas.addEventListener('mouseleave', () => { mousePos = { x: -1, y: -1 }; });
}

function setCanvasSize() {
    // Fixed logical size; display scales via CSS
    W = 1200; H = 1200;
    canvas.width = W; canvas.height = H;
    const size = Math.min(window.innerWidth - 340, window.innerHeight - 40);
    const display = Math.max(300, size);
    canvas.style.width = display + 'px';
    canvas.style.height = display + 'px';
}

function regenerate() {
    seedOffset = state.seed;
    const cs = state.cellSize;
    gridCols = Math.ceil(W / cs);
    gridRows = Math.ceil(H / cs);
    const rng = mulberry32(state.seed);
    const pal = getPaletteColors();
    const act = state.activeShapes.length ? state.activeShapes : ['dot'];
    cells = new Array(gridCols * gridRows);
    for (let i = 0; i < gridCols * gridRows; i++) {
        const col = i % gridCols, row = Math.floor(i / gridCols);
        const sN = noise2D(col * 0.08 + 100, row * 0.08 + 100);
        const cN = noise2D(col * 0.06 + 200, row * 0.06 + 200);
        cells[i] = {
            shape: act[Math.floor(sN * act.length) % act.length],
            colorIdx: Math.floor(cN * pal.length) % pal.length,
            phase: rng() * Math.PI * 2,
            baseSize: 0.4 + sN * 0.55,
        };
    }
    dirty = true;
    document.getElementById('status').textContent = `seed ${state.seed} · ${gridCols}×${gridRows} · ${state.palette}`;
}

// ═══ SHAPE DRAW (main canvas) ═══
function drawShape(x, y, s, shape, color, alpha) {
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color; ctx.strokeStyle = color;
    ctx.lineWidth = Math.max(1, s * 0.14);
    const half = s / 2;
    switch (shape) {
        case 'circle': ctx.beginPath(); ctx.arc(x+half, y+half, half*0.85, 0, Math.PI*2); ctx.fill(); break;
        case 'ring': ctx.beginPath(); ctx.arc(x+half, y+half, half*0.75, 0, Math.PI*2); ctx.stroke(); break;
        case 'cross': { const arm = s*0.12, ext = half*0.8;
            ctx.fillRect(x+half-arm, y+half-ext, arm*2, ext*2);
            ctx.fillRect(x+half-ext, y+half-arm, ext*2, arm*2); break; }
        case 'rect': ctx.fillRect(x+s*0.12, y+s*0.12, s*0.76, s*0.76); break;
        case 'dot': ctx.beginPath(); ctx.arc(x+half, y+half, half*0.3, 0, Math.PI*2); ctx.fill(); break;
        case 'dash': ctx.fillRect(x+s*0.1, y+half-s*0.08, s*0.8, s*0.16); break;
        case 'diamond':
            ctx.beginPath();
            ctx.moveTo(x+half, y+s*0.1); ctx.lineTo(x+s*0.9, y+half);
            ctx.lineTo(x+half, y+s*0.9); ctx.lineTo(x+s*0.1, y+half);
            ctx.closePath(); ctx.fill(); break;
    }
}

function drawFrame() {
    const cs = state.cellSize;
    const pal = getPaletteColors();
    const bg = getBg();

    ctx.globalAlpha = 1;
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    const mouseOn = state.mouseReactive && mousePos.x >= 0;
    const ns = state.noiseScale;
    const fs = state.flowSpeed;
    const sinT = Math.sin(timeT * 0.3) * 0.5;
    const cosT = Math.cos(timeT * 0.25) * 0.3;
    const pulseT = timeT * 1.2;

    for (let i = 0; i < cells.length; i++) {
        const cell = cells[i];
        if (!cell) continue;
        const col = i % gridCols, row = (i / gridCols) | 0;

        // 2-octave fbm — fast
        const nx = col * ns + timeT * fs + sinT;
        const ny = row * ns + timeT * fs * 0.6 + cosT;
        const density = fbm2(nx, ny);

        let mouseBoost = 0;
        if (mouseOn) {
            const mx = col / gridCols, my = row / gridRows;
            const dx = mx - mousePos.x, dy = my - mousePos.y;
            const dist2 = dx*dx + dy*dy; // skip sqrt
            if (dist2 < 0.0625) mouseBoost = (1 - Math.sqrt(dist2) / 0.25) * 0.5;
        }

        if (density + mouseBoost < state.sparsity) continue;

        const energy = Math.min(1, (density + mouseBoost - state.sparsity) * 3.5);
        const pulseMul = 1 + Math.sin(pulseT + cell.phase) * state.pulse * energy;
        const drawSize = cs * cell.baseSize * state.shapeScale * pulseMul;
        const x = col * cs + (cs - drawSize) / 2;
        const y = row * cs + (cs - drawSize) / 2;

        drawShape(x, y, drawSize, cell.shape, pal[cell.colorIdx % pal.length], Math.min(1, energy * 1.2));
    }
    ctx.globalAlpha = 1;
    dirty = false;
}

function startLoop() {
    cancelAnimationFrame(animFrame);
    function loop(ts) {
        if (!lastFrameTime) lastFrameTime = ts;
        const elapsed = ts - lastFrameTime;
        if (elapsed >= FRAME_INTERVAL) {
            lastFrameTime = ts - (elapsed % FRAME_INTERVAL);
            timeT += 0.033; // fixed step for 30fps
            drawFrame();
        }
        animFrame = requestAnimationFrame(loop);
    }
    animFrame = requestAnimationFrame(loop);
}

function exportFrame() {
    const scale = parseInt(document.getElementById('exportRes').value);
    const ec = document.createElement('canvas');
    ec.width = W * scale; ec.height = H * scale;
    const ectx = ec.getContext('2d');
    ectx.imageSmoothingEnabled = false;
    ectx.drawImage(canvas, 0, 0, W * scale, H * scale);
    const link = document.createElement('a');
    link.download = `pattern-${state.palette}-seed${state.seed}.png`;
    link.href = ec.toDataURL('image/png');
    link.click();
}

let mediaRec, recChunks = [], isRecording = false;
function toggleRecord() {
    if (isRecording) return;
    if (!state.animated) { alert('Enable Animated to record.'); return; }
    recChunks = [];
    const stream = canvas.captureStream(30);
    try { mediaRec = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9', videoBitsPerSecond: 8000000 }); }
    catch(e) { mediaRec = new MediaRecorder(stream); }
    mediaRec.ondataavailable = e => { if (e.data.size > 0) recChunks.push(e.data); };
    mediaRec.onstop = () => {
        const blob = new Blob(recChunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.download = `pattern-${state.palette}-seed${state.seed}.webm`;
        link.href = url; link.click();
        document.getElementById('recordBtn').textContent = 'Record 5s';
        document.getElementById('recordBtn').classList.remove('primary');
        isRecording = false;
    };
    mediaRec.start();
    isRecording = true;
    document.getElementById('recordBtn').textContent = 'Recording…';
    document.getElementById('recordBtn').classList.add('primary');
    setTimeout(() => { if (mediaRec.state !== 'inactive') mediaRec.stop(); }, 5000);
}

// Init
applyTheme(state.theme);
setCanvasSize();
window.addEventListener('resize', setCanvasSize);
buildPresets();
buildShapes();
buildPalettes();
wireControls();
applyPreset(PRESETS[0]);
startLoop();
</script>
